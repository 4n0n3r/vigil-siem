# nginx reverse proxy for the Vigil web dashboard (self-hosted on 23.94.51.11).
#
# This config is the source of truth for web access logs on the self-hosted instance.
# The vigil agent's WebLogCollector tails /var/log/nginx/vigil-web-access.log and
# streams events to the API — status_code and bytes_sent are real post-response values.
#
# Deploy:
#   sudo cp vigil-web.conf /etc/nginx/sites-available/vigil-web
#   sudo ln -s /etc/nginx/sites-available/vigil-web /etc/nginx/sites-enabled/vigil-web
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add the WebLogCollector to the vigil agent config:
#   --weblog-app vigil-dashboard \
#   --weblog-path /var/log/nginx/vigil-web-access.log \
#   --weblog-format nginx

server {
    listen 80;
    server_name _;  # replace with dashboard.vigil-siem.com once DNS is pointed here

    # Combined log format — fields map 1:1 to WebLogCollector's nginx parser.
    # $request_time gives response latency for future correlation rules.
    log_format vigil_combined '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent" '
                               'rt=$request_time';

    access_log /var/log/nginx/vigil-web-access.log vigil_combined;
    error_log  /var/log/nginx/vigil-web-error.log warn;

    # Pass the real client IP through to the Next.js app.
    real_ip_header     X-Forwarded-For;
    real_ip_recursive  on;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — Next.js SSR pages can take a moment on cold start.
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Block direct access to Next.js internals.
    location /_next/webpack-hmr {
        return 403;
    }
}
