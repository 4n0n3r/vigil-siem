<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>vigil — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40' fill='none'><rect width='40' height='40' rx='8' fill='%23080B10'/><path d='M4 20 C10 8%2C 30 8%2C 36 20' stroke='%23E2E8F0' stroke-width='2.5' stroke-linecap='round' fill='none'/><circle cx='20' cy='20' r='5' fill='%2300E5FF'/><circle cx='20' cy='20' r='2' fill='%23080B10'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root,[data-theme="dark"]{
  --bg:#080B10;--card:#0E1117;--el:#161B22;--bd:#1E2633;
  --tx:#E2E8F0;--txm:#718096;
  --cyan:#00E5FF;--red:#F85149;--amber:#FFB547;
  --green:#3FB950;--yellow:#E6C84A;--purple:#A78BFA;
  --card-shadow:none;
  --radial:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,229,255,.055) 0%,transparent 65%);
}
[data-theme="light"]{
  --bg:#F8FAFC;--card:#FFFFFF;--el:#F1F5F9;--bd:rgba(15,23,42,.07);
  --tx:#0F172A;--txm:#64748B;
  --cyan:#0891B2;--red:#DC2626;--amber:#D97706;
  --green:#16A34A;--yellow:#CA8A04;--purple:#7C3AED;
  --card-shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --radial:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(8,145,178,.04) 0%,transparent 65%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden}
body{background:var(--bg);background-image:var(--radial);color:var(--tx);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--txm)}
::selection{background:rgba(0,229,255,.18);color:var(--tx)}
:focus-visible{outline:2px solid rgba(0,229,255,.55);outline-offset:2px;border-radius:4px}
input,select,textarea{transition:border-color .15s ease,box-shadow .15s ease}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)!important;box-shadow:0 0 0 3px rgba(0,229,255,.1)!important}
input::placeholder{color:var(--txm);opacity:1}
select{appearance:none}
button{transition:all .13s ease;font-family:'Space Grotesk',sans-serif}
button:active{transform:scale(.97)!important}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.42;transform:scale(.8)}}
@keyframes slidein{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glowin{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.3)}50%{box-shadow:0 0 0 5px rgba(248,81,73,0)}}
@keyframes drawerIn{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes staggerIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes highlightIn{from{background:rgba(0,229,255,.14)}to{background:transparent}}
.anim-in{animation:slidein .22s ease both}
.fade-in{animation:fadeIn .2s ease both}
.shimmer-line{background:linear-gradient(90deg,var(--bd) 25%,var(--el) 50%,var(--bd) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
.stagger>*{animation:staggerIn .3s ease both}
.stagger>*:nth-child(1){animation-delay:.00s}.stagger>*:nth-child(2){animation-delay:.04s}
.stagger>*:nth-child(3){animation-delay:.08s}.stagger>*:nth-child(4){animation-delay:.12s}
.stagger>*:nth-child(5){animation-delay:.16s}.stagger>*:nth-child(6){animation-delay:.20s}
table{border-spacing:0}
th{font-weight:700;white-space:nowrap}
td{vertical-align:middle}
</style>
</head>
<body>
<div id="root"></div>

<script src="/static/api.js"></script>
<script type="text/babel" src="/static/shared.jsx"></script>
<script type="text/babel" src="/static/DashboardView.jsx"></script>
<script type="text/babel" src="/static/LiveFeedView.jsx"></script>
<script type="text/babel" src="/static/AlertsView.jsx"></script>
<script type="text/babel" src="/static/HuntView.jsx"></script>
<script type="text/babel" src="/static/RulesView.jsx"></script>
<script type="text/babel" src="/static/SuppressionsView.jsx"></script>
<script type="text/babel" src="/static/AgentsView.jsx"></script>
<script type="text/babel" src="/static/ConnectorsView.jsx"></script>
<script type="text/babel" src="/static/AlertInvestigationView.jsx"></script>

<script type="text/babel">
const {useState, useEffect} = React;

const TWEAK_DEFAULTS = { theme: 'dark', showAI: true };

function todayStr() {
  return new Date().toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

function App() {
  const [nav, setNav]       = useState(() => localStorage.getItem('vigil_nav') || 'dashboard');
  const [range, setRange]   = useState('7D');
  const [tweaks, setTweaks] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('vigil_tweaks_v2') || '{}') }; }
    catch { return { ...TWEAK_DEFAULTS }; }
  });
  const [drawerAlert, setDrawerAlert]               = useState(null);
  const [investigatingAlert, setInvestigatingAlert] = useState(null);
  const [tick, setTick]                             = useState(0);

  useEffect(() => window.VIGIL_BUS.subscribe(() => setTick(t => t + 1)), []);

  const openInvestigation = (alert) => {
    setDrawerAlert(null);
    setInvestigatingAlert(alert);
    localStorage.setItem('vigil_investigating', alert.id);
  };
  const closeInvestigation = () => {
    setInvestigatingAlert(null);
    localStorage.removeItem('vigil_investigating');
  };

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    window.__theme = tweaks.theme;
  }, [tweaks.theme]);

  useEffect(() => { localStorage.setItem('vigil_nav', nav); }, [nav]);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    localStorage.setItem('vigil_tweaks_v2', JSON.stringify(next));
  };
  const toggleTheme = () => updateTweak('theme', tweaks.theme === 'dark' ? 'light' : 'dark');

  const connCount = (window.VIGIL_DATA.CONNECTORS || []).filter(c => c.enabled).length;
  const titles = {
    dashboard:    { title: 'Dashboard',       subtitle: todayStr() },
    feed:         { title: 'Live Feed',       subtitle: `real-time · ${connCount} connectors` },
    alerts:       { title: 'Alerts',          subtitle: 'all alerts · filtered view' },
    hunt:         { title: 'Hunt',            subtitle: 'event search & correlation' },
    rules:        { title: 'Detection Rules', subtitle: 'MITRE ATT&CK coverage' },
    agents:       { title: 'Agents',          subtitle: 'endpoint fleet' },
    connectors:   { title: 'Connectors',      subtitle: 'SIEM integrations' },
    suppressions: { title: 'Suppressions',    subtitle: 'noise reduction rules' },
  };
  const { title, subtitle } = titles[nav] || { title: nav, subtitle: '' };

  const renderView = () => {
    if (investigatingAlert) return <AlertInvestigationView alert={investigatingAlert} onBack={closeInvestigation}/>;
    switch (nav) {
      case 'dashboard':    return <DashboardView range={range} setRange={setRange} onSelectAlert={setDrawerAlert} onInvestigate={openInvestigation}/>;
      case 'feed':         return <LiveFeedView/>;
      case 'alerts':       return <AlertsView onInvestigate={openInvestigation}/>;
      case 'hunt':         return <HuntView/>;
      case 'rules':        return <RulesView/>;
      case 'agents':       return <AgentsView onInvestigate={openInvestigation}/>;
      case 'connectors':   return <ConnectorsView/>;
      case 'suppressions': return <SuppressionsView/>;
      default:             return null;
    }
  };

  return (
    <ThemeCtx.Provider value={tweaks.theme}>
      <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
        {!investigatingAlert && <Sidebar active={nav} onNav={setNav}/>}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
          {!investigatingAlert && (
            <Topbar title={title} subtitle={subtitle}
              range={range} setRange={setRange}
              theme={tweaks.theme} toggleTheme={toggleTheme}/>
          )}
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            {renderView()}
          </div>
        </div>
        {drawerAlert && !investigatingAlert && (
          <AlertDrawer alert={drawerAlert} onClose={() => setDrawerAlert(null)}
            theme={tweaks.theme} onOpenInvestigation={openInvestigation}/>
        )}
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
