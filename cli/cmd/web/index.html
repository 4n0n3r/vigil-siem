<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vigil — Security Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="#/" class="sidebar-logo" style="text-decoration:none">
        <svg class="sidebar-logo-eye" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 20 C10 8, 30 8, 36 20" stroke="#E2E8F0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <circle cx="20" cy="20" r="5" fill="#00E5FF" style="filter:drop-shadow(0 0 5px #00E5FF)"/>
          <circle cx="20" cy="20" r="2" fill="#080B10"/>
        </svg>
        <span class="sidebar-logo-text">vigil</span>
      </a>
      <button class="sidebar-collapse-btn" id="sidebar-toggle" title="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline id="collapse-chevron" points="9,2 4,7 9,12"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-group">
        <span class="sidebar-group-label">Monitor</span>
        <a href="#/" class="sidebar-link" data-route="/">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          <span class="sidebar-link-text">Dashboard</span>
        </a>
        <a href="#/feed" class="sidebar-link" data-route="/feed">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,8 3.5,4 6,11 8.5,6 11,9 13,7 15,8"/></svg>
          <span class="sidebar-link-text">Live Feed</span>
        </a>
      </div>

      <div class="sidebar-group">
        <span class="sidebar-group-label">Investigate</span>
        <a href="#/alerts" class="sidebar-link" data-route="/alerts">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a5 5 0 00-5 5v3L1.5 11.5A.75.75 0 002 13h12a.75.75 0 00.5-1.5L13 9V6A5 5 0 008 1zm-1.5 13a1.5 1.5 0 003 0z"/></svg>
          <span class="sidebar-link-text">Alerts</span>
          <span class="sidebar-badge" id="badge-alerts"></span>
        </a>
        <a href="#/agents" class="sidebar-link" data-route="/agents">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="5" rx="1.5"/><rect x="1" y="9" width="14" height="5" rx="1.5"/><circle cx="12.5" cy="4.5" r="1" fill="#080B10"/><circle cx="12.5" cy="11.5" r="1" fill="#080B10"/></svg>
          <span class="sidebar-link-text">Agents</span>
        </a>
      </div>

      <div class="sidebar-group">
        <span class="sidebar-group-label">Detect</span>
        <a href="#/detections" class="sidebar-link" data-route="/detections">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L2 3.5V8c0 3.5 2.67 6 6 7 3.33-1 6-3.5 6-7V3.5L8 1z"/></svg>
          <span class="sidebar-link-text">Detection Rules</span>
        </a>
      </div>

      <div class="sidebar-group">
        <span class="sidebar-group-label">Integrate</span>
        <a href="#/connectors" class="sidebar-link" data-route="/connectors">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="4" cy="8" r="2.5"/><circle cx="12" cy="4" r="2.5"/><circle cx="12" cy="12" r="2.5"/><line x1="6.5" y1="7" x2="9.5" y2="5"/><line x1="6.5" y1="9" x2="9.5" y2="11"/></svg>
          <span class="sidebar-link-text">Connectors</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-status-row" id="sidebar-status">
        <span class="status-dot" id="status-dot"></span>
        <span class="sidebar-link-text sidebar-status-text" id="sidebar-status-text">Connecting…</span>
      </div>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-area" id="main-area">
    <header class="topbar">
      <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
      <div class="topbar-right">
        <span class="topbar-conn" id="topbar-conn"></span>
      </div>
    </header>
    <div id="app" class="page-content"></div>
  </div>

</div>

<div id="toast" class="toast hidden"></div>
<script src="/static/vendor/chart.min.js"></script>
<script src="/static/vendor/d3.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
