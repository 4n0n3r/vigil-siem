name: Release

# Triggered by a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd cli
          mkdir -p ../dist

          build() {
            local os="$1" arch="$2"
            local name="vigil_${VERSION}_${os}_${arch}"
            [[ "$os" == "windows" ]] && name="${name}.exe"
            echo "Building $name..."
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w -X 'github.com/vigil/vigil/cmd.Version=${VERSION}'" \
              -o "../dist/$name" \
              .
          }

          build linux   amd64
          build linux   arm64
          build darwin  amd64
          build darwin  arm64
          build windows amd64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "vigil v${{ steps.version.outputs.version }}"
          body: |
            ## Install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/4n0n3r/vigil-siem/main/scripts/install.sh | bash
            ```

            **Windows (PowerShell, run as administrator):**
            ```powershell
            irm https://raw.githubusercontent.com/4n0n3r/vigil-siem/main/scripts/install.ps1 | iex
            ```

            **Self-update (if already installed):**
            ```bash
            vigil update
            ```

            See [installation docs](https://github.com/4n0n3r/vigil-siem/blob/main/docs/installation.md) for full setup.
          generate_release_notes: true
          files: dist/*
