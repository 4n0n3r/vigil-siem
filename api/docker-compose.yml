version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app:/app/app          # mount source so edits are live without rebuild
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8001:8001"
    environment:
      - VIGIL_API_HOST=0.0.0.0
      - VIGIL_API_PORT=8001
      - POSTGRES_DSN=postgresql://vigil:vigil@postgres:5432/vigil
      - CLICKHOUSE_DSN=clickhouse://default:@clickhouse:8123/default
    env_file:
      - .env.example            # override with a real .env file if present
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: >
      sh -c "pip install --quiet -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil -d vigil"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP interface (used by clickhouse_connect)
      - "9000:9000"   # native TCP (optional, for CLI/DBeaver)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/listen_host.xml:/etc/clickhouse-server/config.d/listen_host.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
