title: Process Discovery Enumeration
id: e5f60718-9012-3456-ef01-456789012345
status: stable
description: >
  Detects use of tasklist.exe or PowerShell Get-Process for process enumeration.
  Attackers enumerate running processes to find AV/EDR software to evade,
  identify injected processes, or locate target processes for injection.
logsource:
  product: windows
  service: security
detection:
  sysmon_tasklist:
    event_id: 1
    event_data.Image|contains: "tasklist.exe"
  sec_tasklist:
    event_id: 4688
    event_data.NewProcessName|contains: "tasklist.exe"
  sysmon_ps_getprocess:
    event_id: 1
    event_data.Image|contains: "powershell"
    event_data.CommandLine|contains:
      - "Get-Process"
      - "get-process"
      # NOTE: "ps " removed — too broad, matches any parameter starting with 'ps' (e.g. PSModulePath)
  # Filter: IDE/editor detection routines — dev tools (VS Code, Cursor, Windsurf,
  # JetBrains) regularly run `tasklist | findstr` to check which IDE is active.
  # ParentCommandLine pattern is stable across tools and safe to exclude broadly.
  filter_ide_detection:
    event_data.ParentCommandLine|contains:
      - "findstr /I"
    event_data.ParentCommandLine|contains:
      - "Code.exe"
      - "Cursor.exe"
      - "Windsurf.exe"
      - "idea64.exe"
      - "pycharm64.exe"
      - "webstorm64.exe"
      - "rider64.exe"
      - "studio64.exe"
      - "fleet.exe"
  # Filter: monitoring and inventory agents that enumerate processes on a schedule
  filter_monitoring_agents:
    event_data.ParentImage|contains:
      - "\\Microsoft Monitoring Agent\\"
      - "\\Azure Monitor\\"
      - "\\CrowdStrike\\"
      - "\\SentinelOne\\"
      - "\\Qualys\\"
      - "\\Tanium\\"
      - "\\vigil"
  condition: (sysmon_tasklist or sec_tasklist or sysmon_ps_getprocess) and not filter_ide_detection and not filter_monitoring_agents
level: low
tags:
  - attack.discovery
  - attack.t1057
falsepositives:
  - IT administrators running tasklist manually (low risk, low severity)
  - Software installers checking for conflicting processes
