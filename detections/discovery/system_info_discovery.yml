title: System Information Discovery
id: d4e5f607-8901-2345-def0-345678901234
status: stable
description: >
  Detects execution of common system enumeration commands: systeminfo,
  whoami, hostname, ipconfig, and netstat. Attackers run these immediately
  after initial access to understand the environment (OS version, domain
  membership, network adapters, active connections).
logsource:
  product: windows
  service: security
detection:
  sysmon_sysinfo:
    event_id: 1
    event_data.Image|contains:
      - "systeminfo.exe"
      - "whoami.exe"
      - "hostname.exe"
      - "ipconfig.exe"
      - "netstat.exe"
      - "arp.exe"
      - "nslookup.exe"
  sec_sysinfo:
    event_id: 4688
    event_data.NewProcessName|contains:
      - "systeminfo.exe"
      - "whoami.exe"
      - "hostname.exe"
  # Filter: user-launched processes from Explorer (normal desktop usage).
  # Real attackers execute discovery tools from script hosts, Office macros, or
  # remote shells — not by double-clicking from the desktop.
  filter_explorer_launched:
    event_data.ParentImage|contains: "\\explorer.exe"
  # Filter: known legitimate applications and their child processes
  filter_known_apps:
    event_data.ParentImage|contains:
      - "\\Warp\\"
      - "\\WindowsTerminal\\"
      - "\\Code\\"
      - "\\Microsoft VS Code\\"
      - "\\Cursor\\"
      - "\\Microsoft Monitoring Agent\\"
      - "\\services.exe"
      - "\\svchost.exe"
  # Filter: discovery tools spawned from known safe system processes
  filter_system_parent:
    event_data.ParentImage|contains:
      - "\\Windows\\System32\\svchost.exe"
      - "\\Windows\\System32\\WmiPrvSE.exe"
  condition: (sysmon_sysinfo or sec_sysinfo) and not filter_explorer_launched and not filter_known_apps and not filter_system_parent
level: low
tags:
  - attack.discovery
  - attack.t1082
  - attack.t1016
  - attack.t1033
falsepositives:
  - IT administrators running discovery commands from an uncommon shell
  - Custom scripts spawning whoami/ipconfig from non-standard parents
