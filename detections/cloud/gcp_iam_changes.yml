title: GCP IAM Policy Changes
id: gcp-iam-changes
status: stable
description: Detects GCP IAM setIamPolicy calls that may indicate privilege escalation.
author: Vigil
date: 2026/03/24
tags:
  - attack.privilege_escalation
  - attack.t1098
logsource:
  category: cloud
  product: gcp
detection:
  selection:
    method_name|contains: setIamPolicy
    status_code: 200
  condition: selection
falsepositives:
  - Legitimate IAM administration
level: high
