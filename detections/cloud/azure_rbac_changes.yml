title: Azure RBAC Role Assignment Changes
id: azure-rbac-changes
status: stable
description: Detects successful Azure RBAC role assignment changes which may indicate privilege escalation.
author: Vigil
date: 2026/03/24
tags:
  - attack.privilege_escalation
  - attack.t1098
logsource:
  category: cloud
  product: azure
detection:
  selection:
    operation_name|contains: roleAssignments/write
    status: Succeeded
  condition: selection
falsepositives:
  - Legitimate RBAC administration
level: high
