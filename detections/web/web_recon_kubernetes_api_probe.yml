title: Web Recon - Kubernetes API Probe
id: web-k8s-api-001
status: stable
description: Detects probes targeting Kubernetes API endpoints which can expose pod configs, secrets, and service accounts.
author: Vigil
date: 2026/04/24
tags:
  - attack.discovery
  - attack.t1595
logsource:
  product: web
detection:
  src:
    source|startswith: "web:"
  k8s:
    path|startswith: "/api/v1/"
  k8s_ext:
    path|startswith: "/apis/"
  condition: src and (k8s or k8s_ext)
falsepositives:
  - Apps with /api/v1 routes (suppress known app paths)
level: high
