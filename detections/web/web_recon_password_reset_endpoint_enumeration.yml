title: Web Recon - Password Reset Endpoint Enumeration
id: web-password-reset-probe-001
status: stable
description: Detects probes to password reset and account recovery endpoints. Attackers enumerate these for username disclosure, token prediction, and account takeover via insecure reset flows.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1110
  - attack.reconnaissance
logsource:
  product: web
detection:
  sel_forgot:
    source|startswith: "web:"
    path|contains: "/forgot-password"
  sel_reset:
    source|startswith: "web:"
    path|contains: "/reset-password"
  sel_password_reset:
    source|startswith: "web:"
    path|contains: "/password-reset"
  sel_recover:
    source|startswith: "web:"
    path|contains: "/account/recover"
  condition: 1 of sel_*
falsepositives:
  - Legitimate users requesting password resets (suppress by rate-limiting source IP)
level: medium
