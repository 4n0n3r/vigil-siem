title: Web Recon - Monitoring or Metrics Endpoint Probe
id: web-monitoring-probe-001
status: stable
description: Detects probes targeting monitoring and metrics endpoints (Grafana, Prometheus, Kibana, /metrics). These expose infrastructure topology, performance data, and internal service graphs.
author: Vigil
date: 2026/04/25
tags:
  - attack.discovery
  - attack.t1595
logsource:
  product: web
detection:
  sel_grafana:
    source|startswith: "web:"
    path|startswith: "/grafana"
  sel_prometheus:
    source|startswith: "web:"
    path|startswith: "/prometheus"
  sel_metrics:
    source|startswith: "web:"
    path: "/metrics"
  sel_kibana:
    source|startswith: "web:"
    path|startswith: "/kibana"
  condition: 1 of sel_*
falsepositives:
  - Internal monitoring agents hitting /metrics (suppress by source IP)
level: low
