title: Web Recon - Elasticsearch API Probe
id: web-elasticsearch-001
status: stable
description: Detects probes targeting Elasticsearch REST APIs which can expose indexed data and cluster config.
author: Vigil
date: 2026/04/24
tags:
  - attack.discovery
  - attack.t1595
logsource:
  product: web
detection:
  src:
    source|startswith: "web:"
  cat:
    path|startswith: "/_cat/"
  nodes:
    path|startswith: "/_nodes"
  cluster:
    path|startswith: "/_cluster/"
  condition: src and (cat or nodes or cluster)
falsepositives:
  - Elasticsearch monitoring agents (should not route through app)
level: high
