title: Web Recon - Secret or Credential Token in URL Query
id: web-cred-in-url-001
status: stable
description: Detects credentials, API keys, and tokens passed in URL query strings. Secrets in URLs are logged in server access logs, browser history, CDN caches, and referrer headers — exposing them to unintended parties.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1552
logsource:
  product: web
detection:
  selection:
    source|startswith: "web:"
    query|re: "(api[_-]?key|apikey|access[_-]?token|secret[_-]?key|auth[_-]?token|password|passwd|private[_-]?key)=[a-zA-Z0-9+/=_-]{8,}"
  condition: selection
falsepositives:
  - Legacy applications passing auth tokens via GET (should be migrated to POST/headers)
level: high
