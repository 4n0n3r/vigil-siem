title: Web Attack - Log4j JNDI Injection Probe
id: web-log4j-jndi-001
status: stable
description: Detects Log4Shell exploitation attempts (CVE-2021-44228) via JNDI lookup strings in HTTP path, query, or user-agent.
author: Vigil
date: 2026/04/24
tags:
  - attack.initial_access
  - attack.t1190
logsource:
  product: web
detection:
  src:
    source|startswith: "web:"
  jndi_path:
    path|contains: "${jndi:"
  jndi_query:
    query|contains: "${jndi:"
  jndi_ua:
    user_agent|contains: "${jndi:"
  jndi_rl:
    request_line|contains: "${jndi:"
  condition: src and (1 of jndi_*)
falsepositives:
  - None expected
level: critical
