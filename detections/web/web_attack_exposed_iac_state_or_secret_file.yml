title: Web Attack - Exposed IaC State or Secret File
id: web-iac-secret-001
status: stable
description: Detects HTTP access to Infrastructure-as-Code state files and secret files (Terraform state, Ansible vault, .aws/credentials, GCP service account JSON). These files contain plaintext secrets for cloud infrastructure.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1552.001
logsource:
  product: web
detection:
  sel_tfstate:
    source|startswith: "web:"
    path|contains: "terraform.tfstate"
  sel_aws:
    source|startswith: "web:"
    path|contains: ".aws/credentials"
  sel_gcp:
    source|startswith: "web:"
    path|contains: "service-account.json"
  sel_ansible:
    source|startswith: "web:"
    path|contains: "ansible.cfg"
  sel_ext_tfstate:
    source|startswith: "web:"
    extension: "tfstate"
  condition: 1 of sel_*
falsepositives:
  - None expected — these files must never be web-accessible
level: high
