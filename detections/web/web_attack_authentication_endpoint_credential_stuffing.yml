title: Web Attack - Authentication Endpoint Credential Stuffing
id: web-login-bruteforce-001
status: stable
description: Detects repeated POST requests to authentication endpoints combined with 401/403 responses, indicating credential stuffing or brute force. Single-event rule — correlate with source IP frequency for high-confidence detection.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1110.004
logsource:
  product: web
detection:
  sel_login_fail:
    source|startswith: "web:"
    method: "POST"
    status_class: "4xx"
    path|re: "/(login|signin|auth|authenticate|session|token|oauth)"
  condition: sel_login_fail
falsepositives:
  - Legitimate users mistyping credentials, automated testing of login flows
level: high
