title: Axios RAT - C2 Contact via Command Line
id: a1c30e72-7f44-4b8a-0002-6e3f8a2d9c01
status: experimental
description: >
  Detects processes whose command line contains the axios RAT C2 domain
  (sfrclak.com), the campaign ID (6202033), or the fake POST body prefix
  (packages.npm.org/product) used to fetch platform-specific payloads.
  Any match is a strong indicator of active compromise.
  Reference: https://www.stepsecurity.io/blog/axios-compromised-on-npm-malicious-versions-drop-remote-access-trojan
author: Vigil (automated)
date: 2026/03/31
references:
  - https://www.stepsecurity.io/blog/axios-compromised-on-npm-malicious-versions-drop-remote-access-trojan
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    event_id: 1
    event_data.CommandLine|contains:
      - "sfrclak.com"
      - "packages.npm.org/product"
      - "6202033"
  condition: selection
level: critical
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1105
  - supply_chain
falsepositives:
  - None expected — these are highly specific IOCs
