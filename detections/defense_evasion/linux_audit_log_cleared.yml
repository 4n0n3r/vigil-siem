title: Linux Audit Log Cleared
id: linux-audit-log-cleared
status: stable
description: Detects auditd configuration changes consistent with clearing or wiping the audit log.
author: Vigil
date: 2026/03/24
tags:
  - attack.defense_evasion
  - attack.t1070.002
logsource:
  product: linux
  service: auditd
detection:
  selection:
    source: auditd:system
    type: CONFIG_CHANGE
    key: audit-wipe
  condition: selection
falsepositives:
  - Legitimate audit configuration changes by admins
level: high
