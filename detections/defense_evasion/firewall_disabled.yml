title: Windows Firewall Disabled
id: c3d4e5f6-0712-8901-bcde-f01234567890
status: stable
description: >
  Detects Windows Firewall being disabled via netsh commands or the Firewall
  service being stopped (Event 5025). Attackers disable the firewall to
  allow inbound C2 connections or lateral movement without port restrictions.
logsource:
  product: windows
  service: security
detection:
  # Firewall service stopped (Security channel)
  firewall_stopped:
    event_id: 5025
  # netsh commands to disable firewall — Security 4688 or Sysmon 1
  sec_netsh:
    event_id: 4688
    event_data.CommandLine|contains:
      - "advfirewall set allprofiles state off"
      - "advfirewall set currentprofile state off"
      - "firewall set opmode disable"
      - "firewall set opmode mode=disable"
  sysmon_netsh:
    event_id: 1
    event_data.CommandLine|contains:
      - "advfirewall set allprofiles state off"
      - "advfirewall set currentprofile state off"
      - "firewall set opmode disable"
      - "firewall set opmode mode=disable"
  condition: firewall_stopped or sec_netsh or sysmon_netsh
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.004
falsepositives:
  - Authorized firewall management by IT administrators
  - Network testing in isolated lab environments
