title: SQL Injection Attempt in HTTP Request
id: c3d4e5f6-0003-4a7b-bc0d-9e8f7a6b5c4d
status: stable
description: >
  Detects SQL injection patterns in the URL path or decoded query string.
  Matches SQL keywords (SELECT, UNION, INSERT, UPDATE, DELETE, DROP, EXEC),
  comment sequences (--), stacked queries (;), and boolean-based payloads
  (OR 1=1). The web log collector URL-decodes query strings before evaluation.
  High-confidence signal when combined with error responses (status_class 5xx).
logsource:
  channel: web
detection:
  selection:
    channel: "web"
    has_sql_chars: true
  condition: selection
level: high
tags:
  - attack.initial_access
  - attack.t1190
  - attack.credential_access
  - attack.t1078
falsepositives:
  - Search queries containing SQL-like syntax in legitimate applications
  - Code editors or IDE web UIs accepting SQL text input
