title: Path Traversal Attempt in HTTP Request
id: b2c3d4e5-0002-4f6a-ab9c-8d7e6f5a4b3c
status: stable
description: >
  Detects path traversal sequences (../, ..\, URL-encoded variants) in
  the HTTP request path or query string. The web log collector URL-decodes
  values before evaluation so encoded sequences like %2e%2e%2f are caught.
  Any traversal attempt against a public web app warrants investigation.
logsource:
  channel: web
detection:
  selection:
    channel: "web"
    has_traversal: true
  condition: selection
level: high
tags:
  - attack.initial_access
  - attack.t1190
  - attack.defense_evasion
  - attack.t1027
falsepositives:
  - Legitimate file paths containing ".." in CMS or framework routing
  - API endpoints that accept relative path parameters
