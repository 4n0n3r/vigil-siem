title: Linux Auth - SSH Login Attempt for System Service Account
id: linux-ssh-service-account-001
status: stable
description: Detects SSH login attempts targeting system service accounts (www-data, daemon, nobody, mysql, postgres). These accounts should never authenticate via SSH — such attempts indicate credential stuffing or knowledge of a local privilege escalation path.
author: Vigil
date: 2026/04/26
tags:
  - attack.credential_access
  - attack.t1078.001
logsource:
  product: linux
  service: auth
detection:
  sel_www:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "sshd"
    MESSAGE|contains|all:
      - "Invalid user"
      - "www-data"
  sel_daemon:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "sshd"
    MESSAGE|contains|all:
      - "Invalid user"
      - "daemon"
  sel_nobody:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "sshd"
    MESSAGE|contains|all:
      - "Invalid user"
      - "nobody"
  sel_mysql:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "sshd"
    MESSAGE|contains|all:
      - "Invalid user"
      - "mysql"
  sel_postgres:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "sshd"
    MESSAGE|contains|all:
      - "Invalid user"
      - "postgres"
  condition: 1 of sel_*
falsepositives:
  - None expected — service accounts should not have valid shells or SSH access
level: high
