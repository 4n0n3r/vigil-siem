title: Linux Sudo Authentication Failure
id: linux-sudo-abuse
status: stable
description: Detects repeated sudo authentication failures which may indicate privilege escalation attempts.
author: Vigil
date: 2026/03/24
tags:
  - attack.credential_access
  - attack.t1548.003
logsource:
  product: linux
  service: auth
detection:
  selection:
    source: syslog:auth
    message|contains:
      - 'sudo:'
      - 'FAILED'
  condition: selection
falsepositives:
  - Legitimate failed sudo attempts by users
level: medium
