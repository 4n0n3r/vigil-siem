title: LSASS Process Handle Acquisition
id: 4d5e6f70-8901-bcde-f012-34567890abcd
status: experimental
description: >
  Detects attempts to open a handle to the LSASS process (Event ID 4656),
  which is a prerequisite for credential dumping tools such as Mimikatz,
  ProcDump, and Task Manager dump.
logsource:
  product: windows
  service: security
detection:
  selection:
    event_id: 4656
    event_data.ObjectName|contains: "lsass"
  condition: selection
level: high
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
falsepositives:
  - Legitimate security tools (EDR agents, AV scanners)
  - Windows Defender Credential Guard inspection
