title: LSASS Process Access for Credential Dumping
id: 4d5e6f70-8901-bcde-f012-34567890abcd
status: stable
description: >
  Detects attempts to access the LSASS process for credential dumping.
  Covers Security Event 4656 (object handle request, requires Object Access auditing)
  and Sysmon Event 10 (ProcessAccess, always available when Sysmon is installed).
  Tools like Mimikatz, ProcDump, and Task Manager dumps all trigger this.
logsource:
  product: windows
  service: security
detection:
  # Security channel: Event 4656 (object handle request to lsass)
  # Requires: Audit Object Access -> Kernel Object -> Success/Failure
  sec_lsass_handle:
    event_id: 4656
    event_data.ObjectName|contains: "lsass"
    event_data.ObjectType: "Process"
  # Sysmon Event 10: ProcessAccess - fired whenever a process opens a handle to another
  # GrantedAccess masks typical of credential dumping tools:
  #   0x1010  — Mimikatz default (PROCESS_QUERY_LIMITED_INFORMATION | PROCESS_VM_READ)
  #   0x1410  — Mimikatz variant (adds PROCESS_QUERY_INFORMATION)
  #   0x1438  — ProcDump
  #   0x1fffff — PROCESS_ALL_ACCESS (crude but seen in the wild)
  sysmon_lsass_access:
    event_id: 10
    event_data.TargetImage|contains: "lsass"
    event_data.GrantedAccess:
      - "0x1010"
      - "0x1410"
      - "0x1438"
      - "0x1fffff"
  # Exclude known-legitimate system and security processes that routinely open LSASS.
  # svchost.exe: credential services, authentication subsystem (193 FP/day in testing)
  # MsMpEng.exe: Windows Defender real-time protection scan (20 FP/day in testing)
  #   NOTE: modern Defender runs from ProgramData\...\Platform\<ver>\, not Program Files
  # wininit.exe, csrss.exe: core Windows session managers — always legitimate
  # compattelrunner.exe: Windows compatibility telemetry
  # lsm.exe: Local Session Manager — legitimate LSASS consumer
  # NOTE: Sysmon uses SourceImage; Security 4656 uses ProcessName. Both filters are
  # needed so the allowlist applies regardless of which event channel fires.
  filter_sysmon_processes:
    event_data.SourceImage|contains:
      - "\\Windows\\system32\\svchost.exe"
      - "\\Windows\\System32\\svchost.exe"
      - "\\Program Files\\Windows Defender\\MsMpEng.exe"
      - "\\ProgramData\\Microsoft\\Windows Defender\\Platform\\"
      - "\\Windows\\system32\\wininit.exe"
      - "\\Windows\\system32\\csrss.exe"
      - "\\Windows\\system32\\lsm.exe"
      - "\\Windows\\system32\\compattelrunner.exe"
      - "\\Windows\\system32\\taskhostw.exe"
  filter_security_processes:
    event_data.ProcessName|contains:
      - "\\Windows\\system32\\svchost.exe"
      - "\\Windows\\System32\\svchost.exe"
      - "\\Program Files\\Windows Defender\\MsMpEng.exe"
      - "\\ProgramData\\Microsoft\\Windows Defender\\Platform\\"
      - "\\Windows\\system32\\wininit.exe"
      - "\\Windows\\system32\\csrss.exe"
      - "\\Windows\\system32\\lsm.exe"
      - "\\Windows\\system32\\compattelrunner.exe"
      - "\\Windows\\system32\\taskhostw.exe"
  condition: (sec_lsass_handle or sysmon_lsass_access) and not filter_sysmon_processes and not filter_security_processes
level: high
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
falsepositives:
  - EDR agents (add their process paths to the appropriate filter)
  - Task Manager full dump initiated by an administrator
  - MicrosoftEdgeUpdate.exe (seen accessing LSASS for token operations — verify version)
