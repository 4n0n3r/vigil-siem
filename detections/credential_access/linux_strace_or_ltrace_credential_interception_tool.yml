title: Linux - Strace or Ltrace Credential Interception Tool
id: linux-strace-001
status: stable
description: Detects strace or ltrace execution. Attackers use these debugging tools to intercept system calls and library calls, capturing plaintext passwords, tokens, and encryption keys processed by running applications.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1003
  - attack.discovery
logsource:
  product: linux
detection:
  sel_strace:
    source|startswith: "journald:"
    _COMM: "strace"
  sel_ltrace:
    source|startswith: "journald:"
    _COMM: "ltrace"
  condition: 1 of sel_*
falsepositives:
  - Authorized debugging by developers (should not occur on production systems)
level: medium
