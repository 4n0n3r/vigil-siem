title: Windows Security - Account Password Reset by Administrator
id: win-sec-4724-001
status: stable
description: Detects an administrator resetting another account password (Event ID 4724). Unexpected password resets may indicate an attacker taking control of an account or preparing lateral movement credentials.
author: Vigil
date: 2026/04/26
tags:
  - attack.credential_access
  - attack.t1098
logsource:
  product: windows
  service: security
detection:
  selection:
    source|startswith: "winlog:"
    event_id: 4724
  condition: selection
falsepositives:
  - Authorized IT helpdesk password resets (should have associated ticket)
level: medium
