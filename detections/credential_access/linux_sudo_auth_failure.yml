title: Linux Sudo Authentication Failure
id: 4a7b3c2d-1e0f-4a5b-8c9d-e0f1a2b3c4d5
status: stable
description: Detects failed sudo authentication attempts which may indicate privilege escalation attempts or unauthorized access.
author: Vigil
date: 2026/03/24
tags:
  - attack.privilege_escalation
  - attack.credential_access
  - attack.t1548.003
logsource:
  product: linux
  service: auth
detection:
  selection:
    source|startswith: "syslog:"
    message|contains: 'sudo:'
  filter_sudo_success:
    message|contains: 'COMMAND='
  condition: selection and not filter_sudo_success
falsepositives:
  - Legitimate failed sudo attempts by authorized users
level: medium
