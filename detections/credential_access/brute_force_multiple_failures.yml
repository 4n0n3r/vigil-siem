title: Multiple Failed Logon Attempts (Brute Force)
id: 3c4d5e6f-7890-abcd-ef01-234567890abc
status: stable
description: >
  Detects repeated failed Windows logon attempts from a single source,
  which may indicate a brute-force or password spray attack.
  Each 4625 event is evaluated individually; correlate by TargetUserName
  or IpAddress to identify bursts.
logsource:
  product: windows
  service: security
detection:
  selection:
    event_id: 4625
    event_data.LogonType:
      - "3"
      - "8"
      - "10"
  condition: selection
level: medium
tags:
  - attack.credential_access
  - attack.t1110
  - attack.t1110.001
falsepositives:
  - Misconfigured services with stale credentials
  - Legitimate remote access with wrong password
