title: Multiple Failed Logon Attempts (Brute Force)
id: 3c4d5e6f-7890-abcd-ef01-234567890abc
status: stable
description: >
  Detects failed Windows logon attempts (Event ID 4625).
  LogonType 2 = interactive, 3 = network, 7 = unlock, 8 = cleartext,
  10 = remote interactive (RDP). All are relevant; correlate by
  TargetUserName or IpAddress to identify bursts.
logsource:
  product: windows
  service: security
detection:
  selection:
    # Scope to Security channel — event ID 4625 exists in the Application
    # channel for unrelated events and will cause false positives without this.
    channel: "Security"
    event_id: 4625
    event_data.LogonType:
      - "2"
      - "3"
      - "7"
      - "8"
      - "10"
  # Filter: loopback and link-local addresses — these are local authentication
  # events (e.g. testing, local service auth), not remote brute force attempts.
  filter_loopback:
    event_data.IpAddress:
      - "127.0.0.1"
      - "::1"
      - "-"
  condition: selection and not filter_loopback
level: medium
tags:
  - attack.credential_access
  - attack.t1110
  - attack.t1110.001
falsepositives:
  - Misconfigured services with stale credentials
  - Legitimate remote access with wrong password
  - Screen saver unlock with wrong PIN
