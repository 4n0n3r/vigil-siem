title: Linux - Cleartext Password in Journald Message
id: linux-cleartext-cred-001
status: stable
description: Detects plaintext password strings appearing in journald log entries. Applications logging credentials in plaintext create exposure in log aggregation systems, SIEM, and anyone with log read access.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1552.001
logsource:
  product: linux
detection:
  sel_password_eq:
    source|startswith: "journald:"
    MESSAGE|re: "password[=: ]+['\"]?[a-zA-Z0-9!@#$%^&*()_+]{6,}"
  sel_passwd_eq:
    source|startswith: "journald:"
    MESSAGE|re: "passwd[=: ]+['\"]?[a-zA-Z0-9!@#$%^&*()_+]{6,}"
  condition: 1 of sel_*
falsepositives:
  - Application error messages including sanitized password hints, auth failure messages with literal word "password"
level: high
