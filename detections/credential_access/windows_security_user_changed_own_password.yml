title: Windows Security - User Changed Own Password
id: win-sec-4723-001
status: stable
description: Detects a user changing their own password (Event ID 4723). Activity baseline rule — unexpected password changes for service accounts or admin accounts outside of rotation schedules warrant review.
author: Vigil
date: 2026/04/29
tags:
  - attack.credential_access
  - attack.t1098
logsource:
  product: windows
  service: security
detection:
  selection:
    source|startswith: "winlog:"
    event_id: 4723
  condition: selection
falsepositives:
  - All legitimate self-service password changes
level: low
