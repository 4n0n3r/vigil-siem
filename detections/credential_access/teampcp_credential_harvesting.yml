title: TeamPCP Supply Chain Attack - Cloud Credential Harvesting
id: d4e5f6a7-b8c9-4d0e-1f23-teampcp00ca01
status: experimental
description: >
  Detects TeamPCP credential harvesting behavior. The malware sweeps for
  cloud credentials (AWS, GCP, Azure), Kubernetes configuration files,
  SSH keys, and LLM API keys from environment variables. It accesses
  the cloud Instance Metadata Service (IMDS) at 169.254.169.254 to
  extract IAM security credentials and session tokens. Also detects
  Python processes reading well-known credential file paths and processes
  reading runner.worker process memory to extract plaintext tokens.
  Reference: https://unit42.paloaltonetworks.com/teampcp-supply-chain-attacks/
author: Vigil (automated)
date: 2026/03/31
references:
  - https://unit42.paloaltonetworks.com/teampcp-supply-chain-attacks/
logsource:
  product: windows
  service: sysmon
detection:
  # 1. Python process connecting to IMDS endpoint (EID 3) - cloud credential theft
  python_imds_access:
    event_id: 3
    event_data.Initiated: "true"
    event_data.Image|contains: "python"
    event_data.DestinationIp: "169.254.169.254"

  # 2. Any process connecting to IMDS on common cloud credential paths (EID 3)
  imds_from_unusual_process:
    event_id: 3
    event_data.Initiated: "true"
    event_data.DestinationIp: "169.254.169.254"
    event_data.Image|contains:
      - "curl"
      - "wget"
      - "openssl"

  # 3. Python reading cloud credential files (EID 1 - command line indicators)
  python_cloud_cred_access:
    event_id: 1
    event_data.Image|contains: "python"
    event_data.CommandLine|contains:
      - ".aws/credentials"
      - ".azure/"
      - ".kube/config"
      - "gcloud/credentials"
      - "OPENAI_API_KEY"
      - "ANTHROPIC_API_KEY"

  # 4. DNS query for IMDS-related token endpoints (unusual on Windows)
  k8s_api_dns:
    event_id: 22
    event_data.QueryName|contains:
      - "kubernetes.default.svc"

  # 5. Python process connecting to Kubernetes API server (EID 3)
  python_k8s_api_access:
    event_id: 3
    event_data.Initiated: "true"
    event_data.Image|contains: "python"
    event_data.DestinationPort:
      - 6443
      - 443
      - 10250

  # 6. Process reading /proc memory (TeamPCP v1 technique - Linux indicator on WSL)
  proc_mem_read:
    event_id: 1
    event_data.CommandLine|contains: "/proc/"
    event_data.CommandLine|contains: "/mem"

  condition: python_imds_access or imds_from_unusual_process or python_cloud_cred_access or k8s_api_dns or proc_mem_read
level: high
tags:
  - attack.credential_access
  - attack.t1552.005
  - attack.t1552.001
  - attack.t1557
  - supply_chain
  - teampcp
falsepositives:
  - Legitimate cloud SDKs and CLIs access IMDS for authentication (AWS CLI, Azure CLI)
  - Filter by process — python accessing IMDS is normal for cloud apps but suspicious when combined with other TeamPCP indicators
  - Kubernetes admin tools legitimately query the K8s API on port 6443
  - The python_k8s_api_access condition is deliberately excluded from the final condition to reduce noise; uncomment if running in cloud environments
