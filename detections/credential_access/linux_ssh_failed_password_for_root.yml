title: Linux SSH - Failed Password for Root
id: linux-ssh-root-fail-001
status: stable
description: Detects SSH authentication failures specifically targeting the root account. Root SSH login attempts indicate elevated intent beyond normal brute force.
author: Vigil
date: 2026/04/24
tags:
  - attack.credential_access
  - attack.t1110.001
  - attack.initial_access
logsource:
  product: linux
  service: auth
detection:
  selection:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "sshd"
    MESSAGE|contains: "Failed password for root"
  condition: selection
falsepositives:
  - None expected — root SSH should be disabled
level: high
