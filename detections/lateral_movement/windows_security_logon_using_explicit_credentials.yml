title: Windows Security - Logon Using Explicit Credentials
id: win-sec-4648-001
status: stable
description: Detects use of explicit alternate credentials for logon (Event ID 4648). Common in pass-the-hash, lateral movement, and runas-based privilege escalation. Frequent false positives in scheduled tasks.
author: Vigil
date: 2026/04/25
tags:
  - attack.lateral_movement
  - attack.t1550.002
  - attack.privilege_escalation
  - attack.t1548
logsource:
  product: windows
  service: security
detection:
  selection:
    source|startswith: "winlog:"
    event_id: 4648
  condition: selection
falsepositives:
  - Scheduled tasks running as alternate accounts, legacy apps using explicit credentials
level: medium
