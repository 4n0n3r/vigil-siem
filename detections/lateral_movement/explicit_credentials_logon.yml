title: Explicit Credentials Used for Lateral Movement
id: 1415cdde-5678-2345-6789-0abcdef01234
status: stable
description: >
  Detects logon events where explicit credentials were used (Event ID 4648).
  This occurs when RunAs, WMI, PsExec, or similar tools authenticate with
  alternative credentials, which is a strong indicator of lateral movement.
logsource:
  product: windows
  service: security
detection:
  selection:
    event_id: 4648
  filter_system:
    event_data.SubjectUserName|endswith: "$"
  # Filter: loopback and link-local IPs. Explicit credential usage to localhost
  # (e.g. local RunAs, localhost SMB) is not lateral movement. The signal is in
  # remote IPs — a user authenticating to a *different* host with explicit creds.
  filter_loopback:
    event_data.IpAddress:
      - "127.0.0.1"
      - "::1"
      - "-"
  filter_link_local:
    event_data.IpAddress|startswith: "fe80::"
  # Filter: self-targeting — when TargetServerName matches the local computer
  # name, credentials are being used locally, not for lateral movement.
  filter_self_target:
    event_data.TargetServerName|contains: "UX200d"
  condition: selection and not filter_system and not filter_loopback and not filter_link_local
level: medium
tags:
  - attack.lateral_movement
  - attack.t1550.002
  - attack.credential_access
falsepositives:
  - Administrators using RunAs for privilege elevation to a remote host
  - Scheduled tasks authenticating to network shares with explicit credentials
  - CI/CD pipelines using service account credentials for remote deployment
