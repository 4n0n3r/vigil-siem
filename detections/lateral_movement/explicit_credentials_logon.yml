title: Explicit Credentials Used for Lateral Movement
id: 1415cdde-5678-2345-6789-0abcdef01234
status: stable
description: >
  Detects logon events where explicit credentials were used (Event ID 4648).
  This occurs when RunAs, WMI, PsExec, or similar tools authenticate with
  alternative credentials, which is a strong indicator of lateral movement.
logsource:
  product: windows
  service: security
detection:
  selection:
    event_id: 4648
  filter_system:
    event_data.SubjectUserName|endswith: "$"
  condition: selection and not filter_system
level: medium
tags:
  - attack.lateral_movement
  - attack.t1550.002
  - attack.credential_access
falsepositives:
  - Administrators using RunAs for privilege elevation
  - Scheduled tasks running as a different user
  - Service account authentication
