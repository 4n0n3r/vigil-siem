title: Windows Security - Service Installed via Audit Log
id: win-sec-4697-001
status: stable
description: Detects service installation captured in the Security audit log (Event ID 4697). Complements System Event 7045 — provides additional context including the account that performed the installation, useful for detecting unauthorized service installation by non-admin accounts.
author: Vigil
date: 2026/04/29
tags:
  - attack.persistence
  - attack.t1543.003
logsource:
  product: windows
  service: security
detection:
  selection:
    source|startswith: "winlog:"
    event_id: 4697
  condition: selection
falsepositives:
  - Legitimate software installations, security agent deployments
level: high
