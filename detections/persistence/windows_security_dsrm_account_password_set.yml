title: Windows Security - DSRM Account Password Set
id: win-sec-4794-001
status: stable
description: Detects Directory Services Restore Mode (DSRM) account password change (Event ID 4794). Attackers set the DSRM password to establish a persistent local administrator backdoor on domain controllers that survives domain password policy.
author: Vigil
date: 2026/04/29
tags:
  - attack.persistence
  - attack.t1098
  - attack.t1003.003
logsource:
  product: windows
  service: security
detection:
  selection:
    source|startswith: "winlog:"
    event_id: 4794
  condition: selection
falsepositives:
  - Authorized DSRM password rotation as part of documented DC maintenance
level: critical
