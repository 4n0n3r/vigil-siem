title: Linux Auth - User Account Password Changed
id: linux-passwd-changed-001
status: stable
description: Detects user password change events logged by the passwd utility. Unexpected password changes may indicate an attacker locking out the legitimate owner of a compromised account.
author: Vigil
date: 2026/04/25
tags:
  - attack.persistence
  - attack.t1531
logsource:
  product: linux
  service: auth
detection:
  selection:
    source|startswith: "journald:"
    SYSLOG_IDENTIFIER: "passwd"
    MESSAGE|contains: "password changed for"
  condition: selection
falsepositives:
  - Legitimate users and admins changing their own passwords
level: medium
