title: Linux Cron Job Modification via Auditd
id: linux-cron-modification
status: stable
description: Detects cron job modifications detected via auditd, a common persistence technique.
author: Vigil
date: 2026/03/24
tags:
  - attack.persistence
  - attack.t1053.003
logsource:
  product: linux
  service: auditd
detection:
  selection:
    source: auditd:system
    key: cron
    type: PATH
  condition: selection
falsepositives:
  - Legitimate cron job management by admins
level: medium
