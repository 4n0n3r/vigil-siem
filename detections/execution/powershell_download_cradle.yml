title: PowerShell Download Cradle
id: 6f708192-0123-def0-1234-567890abcdef
status: stable
description: >
  Detects PowerShell commands that download and execute code from a remote source
  (IEX, Invoke-Expression, DownloadString, WebClient). This pattern is used by
  virtually all PowerShell-based malware for in-memory payload staging.
  Covers both Security Event 4688 and Sysmon Event 1.
logsource:
  product: windows
  service: security
detection:
  # Security channel path
  sec_process:
    event_id: 4688
    event_data.NewProcessName|contains: "powershell"
  sec_download:
    event_data.CommandLine|contains:
      - "IEX"
      - "Invoke-Expression"
      - "DownloadString"
      - "DownloadFile"
      - "WebClient"
      - "Net.WebClient"
      - "Invoke-WebRequest"
      - "iwr "
      - "curl "
      - "wget "
  # Sysmon path
  sysmon_process:
    event_id: 1
    event_data.Image|contains: "powershell"
  sysmon_download:
    event_data.CommandLine|contains:
      - "IEX"
      - "Invoke-Expression"
      - "DownloadString"
      - "DownloadFile"
      - "WebClient"
      - "Net.WebClient"
      - "Invoke-WebRequest"
      - "iwr "
      - "curl "
      - "wget "
  condition: (sec_process and sec_download) or (sysmon_process and sysmon_download)
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.command_and_control
  - attack.t1105
falsepositives:
  - PowerShell package managers (nuget, chocolatey)
  - Legitimate IT automation downloading scripts
