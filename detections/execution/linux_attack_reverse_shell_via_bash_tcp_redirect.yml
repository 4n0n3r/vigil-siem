title: Linux Attack - Reverse Shell via Bash TCP Redirect
id: linux-revshell-bash-001
status: stable
description: Detects the bash reverse shell one-liner using /dev/tcp redirection. Near-zero false positive rate in production.
author: Vigil
date: 2026/04/24
tags:
  - attack.execution
  - attack.t1059.004
  - attack.command_and_control
  - attack.t1071
logsource:
  product: linux
detection:
  selection:
    source|startswith: "journald:"
    MESSAGE|contains: "/dev/tcp/"
  condition: selection
falsepositives:
  - None expected in production environments
level: critical
