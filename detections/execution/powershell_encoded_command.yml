title: PowerShell Encoded Command Execution
id: 5e6f7081-9012-cdef-0123-4567890abcde
status: stable
description: >
  Detects PowerShell processes launched with encoded command arguments
  (-enc, -EncodedCommand, -ec). This is a common technique used by
  malware and post-exploitation frameworks to obfuscate payloads.
  Covers both Security Event 4688 (requires CommandLine audit policy)
  and Sysmon Event 1 (ProcessCreate, always includes CommandLine).
logsource:
  product: windows
  service: security
detection:
  # Security channel path (requires "Include command line in process creation events" GPO)
  sec_process:
    event_id: 4688
    event_data.NewProcessName|contains: "powershell"
  sec_encoded:
    event_data.CommandLine|contains:
      - " -enc "
      - " -EncodedCommand "
      - " -ec "
      - " /enc "
      - " /EncodedCommand "
      # NOTE: " -e " removed — matches -ErrorAction, -ExecutionPolicy short forms, etc.
      # Use -enc / -ec / -EncodedCommand which are unambiguous encoding flags.
  # Sysmon path (always available when Sysmon is installed)
  sysmon_process:
    event_id: 1
    event_data.Image|contains: "powershell"
  sysmon_encoded:
    event_data.CommandLine|contains:
      - " -enc "
      - " -EncodedCommand "
      - " -ec "
      - " /enc "
      - " /EncodedCommand "
      # NOTE: " -e " removed — too broad, see sec_encoded comment above
  condition: (sec_process and sec_encoded) or (sysmon_process and sysmon_encoded)
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
falsepositives:
  - Legitimate automation scripts using encoded parameters
  - Some configuration management tools (Chef, Puppet DSC)
