title: Linux - Outbound SCP File Transfer
id: linux-scp-transfer-001
status: stable
description: Detects SCP process execution. Attackers use SCP to exfiltrate data or transfer additional tools between compromised hosts. Low severity — useful for baselining expected transfer patterns.
author: Vigil
date: 2026/04/29
tags:
  - attack.exfiltration
  - attack.t1048.002
logsource:
  product: linux
detection:
  selection:
    source|startswith: "journald:"
    _COMM: "scp"
  condition: selection
falsepositives:
  - Authorized file transfers by system administrators (high FP rate — baseline and alert on anomalies)
level: low
